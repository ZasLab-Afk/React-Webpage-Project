<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/c6175122c9.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">

</head>
                     <!--Navigation Bar Info-->
<nav>
        <div class="nav__container">
        <div class="logo">
            <img src="react.img/tlogo.svg" alt="treact logo" class="tlogo__img">
            <p class="nav__title">Treact</p>
        </div>
        <ul class="nav__links">
            <li><a href="#">About</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Pricing</a></li>
            <li><a href="#">Contact Us</a></li>
            <li><a href="#" class="nav__login">Login</a></li>
            <li><a href="" class="signup__btn">Sign Up</a></li>
        </ul>
        </div>
    </nav>
                            <!--End of Navigation Bar-->

                             <!--Intro SECTION-->

    <div class="signup__container">

    <h1 class="signup__title">Create Account</h1>
    <p class="signup__text">Get started with our service today</p>

    <form>

        <div class="input__group">
            <div class="input__group--container">
            <label class="input__title--details">Full Name</label>
            <input type="text" placeholder="Enter your name" class="signup__name">
            </div>
        </div>

        <div class="input__group">
            <div class="input__group--container">
            <label class="input__title--details">Email</label>
            <input type="email" placeholder="Enter your email" class="signup__email">
            </div>
        </div>

        <div class="input__group">
            <div class="input__group--container">
            <label class="input__title--details">Password</label>
            <input type="password" placeholder="Enter your password" class="signup__pass">
            </div>
        </div>

        <button type="submit" class="signup__2btn">
            Sign Up
        </button>

    </form>

    <p>
        Already have an account?
        <a href="#" class="login__link">Login</a>
    </p>

</div>                   

</body>
</html>
